name: Deploy Telegram Log Viewer

on:
  push:
    branches: [main]
    paths:
      - 'telegram-8722611614.html'
      - 'data/telegram-8722611614.encrypted.json'
      - '.github/workflows/deploy-telegram-log.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        run: |
          mkdir -p dist/data
          cp telegram-8722611614.html dist/index.html
          cp telegram-8722611614.html dist/telegram-8722611614.html
          cp data/telegram-8722611614.encrypted.json dist/data/telegram-8722611614.encrypted.json
          touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
